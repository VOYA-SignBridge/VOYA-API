name: Build and Push Docker Image

on:
  push:
    branches:
      - aws_deploy

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image with cache
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: tamb2203579/signbridge_api:latest
          cache-from: type=registry,ref=tamb2203579/signbridge_api:buildcache
          cache-to: type=registry,ref=tamb2203579/signbridge_api:buildcache,mode=max
      
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/signbridge_app
            docker compose down
            docker image rm tamb2203579/signbridge:latest
            docker pull tamb2203579/signbridge_api:latest
            docker compose up -d
            docker restart master_proxy